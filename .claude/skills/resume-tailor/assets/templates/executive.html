<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>
<style>
  @page { size: Letter; margin: 0.4in 0.48in; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: #202124;
    font-family: "Segoe UI", Arial, sans-serif;
    font-size: 8.85pt;
    line-height: 1.35;
  }
  h1 {
    margin: 0;
    padding-bottom: 3pt;
    color: #111827;
    font-size: 19pt;
    line-height: 1.1;
    letter-spacing: 0;
  }
  h1 + p {
    margin: 4pt 0 8pt;
    color: #374151;
    font-size: 8.9pt;
  }
  .resume-contact {
    margin: 2pt 0 1pt;
    color: #374151;
    font-size: 8.9pt;
    display: block;
    max-width: 100%;
  }
  .resume-contact-final {
    margin-bottom: 8pt;
    padding-bottom: 4pt;
    border-bottom: 1.2pt solid #31506f;
  }
  h2 {
    margin: 9pt 0 4pt;
    padding: 2.5pt 4pt 2pt;
    background: #eef4f8;
    color: #0f172a;
    font-size: 9.15pt;
    line-height: 1.25;
    text-transform: uppercase;
    letter-spacing: 0;
  }
  h2::after {
    content: "";
    display: block;
    width: 100%;
    height: 0.7pt;
    margin-top: 1.5pt;
    background: #7890aa;
  }
  h3 {
    margin: 5pt 0 1pt;
    color: #111827;
    font-size: 9pt;
    line-height: 1.2;
    font-weight: bold;
  }
  h3 + p {
    margin: 1pt 0 3pt;
    color: #555;
    font-size: 8.85pt;
    line-height: 1.25;
  }
  p { margin: 0 0 3pt; line-height: 1.35; }
  ul { margin: 1pt 0 4pt 12pt; padding: 0; }
  li { margin: 0 0 1.8pt; padding-left: 1pt; }
  a { color: #31506f; text-decoration: none; }
</style>
</head>
<body>
{{ body_html | safe }}
</body>
</html>
