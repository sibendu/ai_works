<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageVoice</title>
  <style>
    body {
      margin: 0;
      padding: 16px 20px;
      width: 200px;
      background: #1a1a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    p {
      margin: 0 0 14px;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      line-height: 1.5;
    }

    .hint {
      background: rgba(79, 142, 247, 0.12);
      border: 1px solid rgba(79, 142, 247, 0.3);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }

    .hint kbd {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h1>PageVoice</h1>
  <p>Reads the main content of any page aloud.</p>
  <div class="hint">
    The player <strong>▶ ⏸ ■</strong> is pinned to the bottom-right of every page.<br><br>
    Press <kbd>Play</kbd> on a new page to re-read from the start.
  </div>
</body>
</html>
